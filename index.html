<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F13" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MLS Gym" />
  <meta name="application-name" content="MLS Gym" />

  <link rel="manifest" href="/manifest.json" />

  <style>
    *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
    html{height:100%;background:#0F0F13;}
    body{margin:0;padding:0;min-height:100dvh;background:#0F0F13;color:#F5F5F0;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;overscroll-behavior:none;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    #root{min-height:100dvh;}
    *{scrollbar-width:none;-ms-overflow-style:none;}
    *::-webkit-scrollbar{display:none;}
    #loading{position:fixed;inset:0;background:#0F0F13;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s ease;}
    #loading.fade-out{opacity:0;pointer-events:none;}
    .loading-icon{width:96px;height:96px;border-radius:22px;background:linear-gradient(135deg,#1E1E28,#2A2A36);display:flex;align-items:center;justify-content:center;font-size:52px;margin-bottom:24px;box-shadow:0 0 40px rgba(59,130,246,0.3);animation:iconPulse 1.4s ease-in-out infinite;}
    .loading-title{font-size:22px;font-weight:800;color:#F5F5F0;margin-bottom:6px;}
    .loading-sub{font-size:14px;color:#6B7280;}
    .loading-bar{width:160px;height:3px;background:#1E1E28;border-radius:2px;margin-top:24px;overflow:hidden;}
    .loading-bar-fill{height:100%;background:linear-gradient(90deg,#3B82F6,#10B981);border-radius:2px;animation:loadBar 1.2s ease-in-out infinite;}
    @keyframes iconPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
    @keyframes loadBar{0%{width:0%;margin-left:0;}50%{width:70%;margin-left:0;}100%{width:10%;margin-left:90%;}}
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-icon">💪🏾</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
  (function(){
    const {useState,useEffect,useRef,useCallback} = React;

    // ── DATA ──────────────────────────────────────────────────────────────────
    const PHASES=[
      {id:1,label:"Phase 1",sublabel:"Foundation",months:"Months 1–2",color:"#3B82F6",description:"Master form on machines. Light weight only. Build the habit.",rules:["Machines only — zero free weights","3 sets × 10–12 reps","Focus on breathing every rep","Never sacrifice form for weight","Increase weight only when 12 reps feel easy for 2 sessions in a row"]},
      {id:2,label:"Phase 2",sublabel:"Volume",months:"Months 3–4",color:"#8B5CF6",description:"Add reps and introduce light dumbbells. Build endurance.",rules:["Machines + light dumbbells introduced","4 sets × 12–15 reps","Reduce rest by 15 sec from Phase 1","Add 1 new exercise per category","Still prioritize form — weight is secondary"]},
      {id:3,label:"Phase 3",sublabel:"Strength",months:"Months 5–6",color:"#10B981",description:"Compound movements, more volume, weekly deload every 4th week.",rules:["Dumbbells + cables primary","4 sets × 8–12 reps with heavier load","Deload every 4th week (reduce weight 40%)","Compound movements introduced","Rest 60–75 sec between sets"]},
      {id:4,label:"Phase 4",sublabel:"Intermediate",months:"Month 7+",color:"#F59E0B",description:"Free weights, split training, progressive overload tracked weekly.",rules:["Free weights + machines combined","Split training: push/pull/legs","5% weight increase every 2 weeks","Track every session","Consider a certified trainer for form checks"]},
    ];

    const USERS={
      marvin:{id:"marvin",name:"Marvin",emoji:"💪🏾",weight:295,startWeight:370,lost:75,profileColor:"#3B82F6",healthNotes:["Back issues — no heavy spinal loading","High blood pressure — exhale on every rep","Beginner-safe form is the priority"]},
      wife:{id:"wife",name:"LaShay",emoji:"🌟",weight:null,startWeight:null,lost:null,profileColor:"#EC4899",healthNotes:["General fitness & strength","Beginner-friendly pace throughout","Modify any exercise as needed"]},
    };

    const WARMUP={id:"warmup",label:"Warm-Up",emoji:"🔥",color:"#F59E0B",description:"Always do this before every session · ~10 minutes",exercises:[
      {id:"seated-marching",name:"Seated Marching",muscles:"Hip Flexors · Light Cardio",sets:"1",reps:"30 sec",rest:"—",restSeconds:0,bpNote:"Ideal warm-up for high BP — gradual heart rate rise",backNote:"Seated = zero spinal load. Perfect opener.",steps:["Sit tall on bench, feet flat on floor, sit slightly forward","Begin lifting alternate knees in a slow marching rhythm","Keep your back straight — string pulling top of head up","Breathe in through nose, out through mouth the whole time","Gradually increase the pace after 10 seconds"],avoid:"Don't hunch forward — tall posture the whole time",tip:"Wakes up hips and safely raises heart rate before lifting"},
      {id:"shoulder-rolls",name:"Shoulder Rolls",muscles:"Shoulders · Upper Traps",sets:"1",reps:"10 fwd + 10 back",rest:"—",restSeconds:0,bpNote:"Slow movement — breathe steadily throughout",backNote:"Releases upper back tension before pressing/pulling",steps:["Stand or sit tall, arms relaxed at sides","Roll both shoulders forward in big slow circles — 10 times","Reverse direction — roll backward 10 times","At top of each roll, gently squeeze shoulder blades together","Keep neck relaxed throughout"],avoid:"Don't rush — slow circles give more benefit",tip:"Counteracts the forward-slouch posture most people carry from daily life"},
      {id:"hip-circles",name:"Hip Circles",muscles:"Hips · Lower Back Mobility",sets:"1",reps:"10 each direction",rest:"—",restSeconds:0,bpNote:"Light movement — breathe continuously",backNote:"Gently mobilizes lower back before any leg work",steps:["Stand feet shoulder-width apart, hands on hips","Make slow large circles with your hips — 10 clockwise","Then 10 counter-clockwise — as big as comfortable","Keep your upper body relatively still","Move within the painless range"],avoid:"Don't force the range — go as far as comfortable only",tip:"Stiffness here is normal. Improves steadily week over week."},
      {id:"bw-squat",name:"Bodyweight Squat (Partial)",muscles:"Quads · Glutes · Ankles",sets:"1",reps:"10",rest:"—",restSeconds:0,bpNote:"Exhale as you stand up each time",backNote:"Quarter squat only — chest up, back stays neutral",steps:["Stand feet slightly wider than shoulder-width, toes out slightly","Hold something sturdy if needed for balance","Breathe in, slowly lower down — quarter to half depth only","Chest up, knees tracking over toes","Exhale and stand back up, squeeze glutes at top","Don't let lower back round — reduce depth if it does"],avoid:"No deep squats for now — quarter range is perfect warm-up",tip:"Best single move to prepare the whole lower body."},
      {id:"arm-circles",name:"Arm Circles + Chest Opener",muscles:"Shoulders · Chest · Upper Back",sets:"1",reps:"10 each dir + 5 opens",rest:"—",restSeconds:0,bpNote:"Keep breathing — no straining",backNote:"Opens chest and activates upper back before pressing",steps:["Stand tall, arms extended out to sides at shoulder height","Make 10 small arm circles forward, then 10 backward","Bring arms in front, cross them like hugging yourself","Open them wide — pull arms back to stretch chest","Repeat open/close 5 times, taking a full breath each rep"],avoid:"Don't lock elbows — slight bend keeps tension off the joint",tip:"The chest opener counteracts slouching — important before upper body days"},

    const WORKOUTS=[
      {id:"lower",label:"Lower Body",emoji:"🦵",color:"#3B82F6",exercises:[
        {id:"leg-press",name:"Seated Leg Press",muscles:"Quads · Glutes · Hamstrings",sets:"3",reps:"10–12",rest:"90 sec",restSeconds:90,bpNote:"Exhale on every push — never hold breath",backNote:"Keep lower back pressed into seat the entire movement",steps:["Sit fully back in seat, back flat against pad","Feet shoulder-width apart, toes slightly turned out","Lower weight slowly — 3 seconds down — until knees at 90°","Push through heels to return, exhaling as you push","Stop just before knees lock out at top","Never let lower back round off the pad"],avoid:"If lower back lifts off the pad, reduce your range of motion",tip:"Start lighter than you think you need. Form first, always."},
        {id:"glute-bridge",name:"Glute Bridge",muscles:"Glutes · Hamstrings · Core",sets:"3",reps:"12–15",rest:"60 sec",restSeconds:60,bpNote:"Breathe out as you lift hips up",backNote:"STRENGTHENS lower back safely — priority exercise for back issues",steps:["Lie on back, knees bent, feet flat hip-width apart","Arms at sides, palms down for stability","Breathe in, then exhale as you press heels into floor and lift hips","Squeeze glutes hard at top — straight line shoulders to knees","Hold top for 2 seconds","Lower slowly — 3 seconds down"],avoid:"Don't hyperextend at top — just a flat straight line",tip:"If you feel it in lower back instead of glutes, move feet closer to your body"},
        {id:"calf-raise",name:"Seated Calf Raise",muscles:"Calves",sets:"3",reps:"15–20",rest:"60 sec",restSeconds:60,bpNote:"Low intensity — great for circulation and BP management",backNote:"Seated = zero spinal load",steps:["Sit at edge of bench or chair, feet flat on floor","If on machine, place pad across lower thighs","Rise up on toes as high as possible, exhaling as you rise","Pause at top 1 second","Lower slowly — feel the stretch in your calf"],avoid:"Don't bounce — full controlled range every rep",tip:"Can do this anywhere — great between sets"},
      ],phaseProgressions:{1:{note:"Machine only. Light weight. 3×10-12. Perfect form priority."},2:{note:"Add a 4th set. Increase reps to 12-15. Introduce dumbbell RDL."},3:{note:"Heavier load. 4×8-12. Add goblet squat. Deload every 4th week."},4:{note:"Barbell hip thrust, dumbbell lunges. Split training. Track weight weekly."}}},

        {id:"chest-press",name:"Seated Chest Press (Machine)",muscles:"Chest · Shoulders · Triceps",sets:"3",reps:"10–12",rest:"90 sec",restSeconds:90,bpNote:"Exhale as you press — never hold breath",backNote:"Back supported by seat — no spinal compression",steps:["Adjust seat so handles are at chest height","Sit back fully, back flat against pad","Neutral grip (palms facing each other) — easier on shoulders","Start with elbows slightly behind body","Exhale and press forward until arms almost fully extended","Slowly return to start — 3 full seconds back"],avoid:"Don't shrug shoulders up — keep them pulled down and back",tip:"Machine beats free weights right now — safer for back and blood pressure"},
        {id:"cable-row",name:"Seated Cable Row",muscles:"Mid Back · Biceps · Rear Shoulders",sets:"3",reps:"10–12",rest:"90 sec",restSeconds:90,bpNote:"Controlled movement — exhale as you pull",backNote:"Builds muscles that PROTECT your back — high priority exercise",steps:["Sit at cable row machine, feet on platform, knees slightly bent","Grab handle with both hands — sit up straight, chest up","Start with arms extended — don't round back to reach","Exhale and pull handle to belly button, squeezing shoulder blades","At end, elbows should be behind you, torso upright","Slowly extend arms back — 3 full seconds"],avoid:"Don't lean way back and use momentum — torso stays stable",tip:"Think 'chest up, squeeze the back' — not just pulling with arms"},
        {id:"lat-pulldown",name:"Lat Pulldown",muscles:"Lats · Biceps · Upper Back",sets:"3",reps:"10–12",rest:"90 sec",restSeconds:90,bpNote:"Exhale on every pull down",backNote:"Safe alternative to pull-ups — builds back without compressing spine",steps:["Sit at lat pulldown machine, thighs secured under pad","Grab bar slightly wider than shoulder width, palms forward","Lean back slightly — 10–15 degrees only","Pull bar to upper chest, exhaling — elbows to back pockets","Slowly let bar rise back up — feel lat stretch"],avoid:"NEVER pull behind the head — stresses neck and upper spine",tip:"If wide bar strains shoulders, ask for a neutral V-bar attachment"},
      ],phaseProgressions:{1:{note:"Machines only. Light weight. 3×10-12. Breathing cue on every rep."},2:{note:"4 sets. Add dumbbell shoulder press seated. 12-15 reps."},3:{note:"Dumbbell bench press added. 4×8-12 heavier. Deload every 4th week."},4:{note:"Push/pull split. Incline press, face pulls. Track progress weekly."}}},
      {id:"core",label:"Core & Cardio",emoji:"🫀",color:"#10B981",exercises:[
        {id:"dead-bug",name:"Dead Bug",muscles:"Deep Core · Lumbar Stability",sets:"3",reps:"8 each side",rest:"60 sec",restSeconds:60,bpNote:"Slow steady breathing — never hold breath",backNote:"One of the safest core exercises for back issues — physio-recommended",steps:["Lie on back, arms pointing straight up toward ceiling","Bring knees up bent at 90°, directly above hips","Press lower back FIRMLY into floor — must not leave floor","Slowly lower right arm overhead AND left leg toward floor simultaneously","Stop before either touches floor — back stays glued down","Return to start, exhale","Switch sides — that's one rep"],avoid:"If lower back arches off floor, you've gone too far — reduce range",tip:"Harder than it looks. Quality over speed, always."},
        {id:"seated-marching",name:"Seated Marching",muscles:"Hip Flexors · Core",sets:"3",reps:"20 total",rest:"45 sec",restSeconds:45,bpNote:"Low intensity rhythmic movement — ideal for blood pressure",backNote:"Zero back strain — fully seated",steps:["Sit tall on bench, feet flat, sit slightly forward","Lift right knee toward chest, lower it","Lift left knee, lower — alternate in steady rhythm","Back straight the whole time","Breathe in nose, out mouth"],avoid:"Don't hunch forward — tall posture entire set",tip:"Works as both warm-up and core work"},
        {id:"walking",name:"Walking",muscles:"Cardiovascular · Full Body",sets:"1",reps:"15–20 min",rest:"—",restSeconds:0,bpNote:"BEST exercise for high blood pressure — lowers BP measurably within 4 weeks",backNote:"Head up, arms swinging naturally — good posture protects spine",steps:["Start at comfortable pace — '5 out of 10' effort","Head up looking forward — not down at feet","Let arms swing naturally with each step","Land mid-foot — not heel slamming","Breathe normally — you should be able to hold a conversation","Increase duration 2–3 min each week"],avoid:"Don't go so fast you're gasping — if you can't talk, slow down",tip:"Walking right after your strength session is the ideal combination"},
      ],phaseProgressions:{1:{note:"Dead bug + seated marching. 10-15 min walk after session."},2:{note:"Bird-dog added. Walking increases to 20 min. Add plank (15-30 sec)."},3:{note:"Pallof press added. Walking 25 min. Core circuit format."},4:{note:"Full core circuit. 30 min walk or light jog intervals."}}},
    ];

    const ALL_CATS=[WARMUP,...WORKOUTS];
    const SCHEDULE=[
      {day:"Monday",focus:"Warm-Up + Lower Body",ids:["warmup","lower"]},
      {day:"Tuesday",focus:"Warm-Up + Walking / Cardio",ids:["warmup","core"]},
      {day:"Wednesday",focus:"Warm-Up + Upper Body",ids:["warmup","upper"]},

      {day:"Sunday",focus:"Full Rest",ids:[]},
    ];

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return h+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");}
    function fmtMi(m){return(m/1609.34).toFixed(2)+" mi";}
    function fmtPace(m,s){if(m<10||s<5)return"--";return((m/1609.34)/(s/3600)).toFixed(1)+" mph";}

    // ── REST TIMER ────────────────────────────────────────────────────────────
    function RestTimer({seconds,onClose}){
      const [t,setT]=useState(seconds),[run,setRun]=useState(true);
      const aRef=useRef(null);
      const beep=useCallback((f=880,d=0.15)=>{try{if(!aRef.current)aRef.current=new(window.AudioContext||window.webkitAudioContext)();const c=aRef.current,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;o.type="sine";g.gain.setValueAtTime(0.4,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d);}catch(e){}},[]);
      useEffect(()=>{if(!run||t<=0)return;const id=setInterval(()=>{setT(v=>{if(v<=1){clearInterval(id);setRun(false);setTimeout(()=>beep(880,0.2),0);setTimeout(()=>beep(880,0.2),280);setTimeout(()=>beep(1100,0.45),560);return 0;}if(v<=4)beep(600,0.08);return v-1;});},1000);return()=>clearInterval(id);},[run,beep]);
      const pct=t/seconds,C=2*Math.PI*52,col=t===0?"#10B981":t<=10?"#EF4444":"#3B82F6";
      return React.createElement("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}},
        React.createElement("div",{style:{background:"#1A1A22",borderRadius:28,padding:36,width:"100%",maxWidth:320,textAlign:"center"}},
          React.createElement("div",{style:{fontSize:13,color:"#9CA3AF",fontWeight:700,letterSpacing:1,marginBottom:28,textTransform:"uppercase"}},"Rest Timer"),
          React.createElement("div",{style:{position:"relative",width:140,height:140,margin:"0 auto 28px"}},
            React.createElement("svg",{width:140,height:140,style:{transform:"rotate(-90deg)"}},
              React.createElement("circle",{cx:70,cy:70,r:52,fill:"none",stroke:"#2A2A36",strokeWidth:10}),
              React.createElement("circle",{cx:70,cy:70,r:52,fill:"none",stroke:col,strokeWidth:10,strokeDasharray:`${pct*C} ${C}`,strokeLinecap:"round",style:{transition:"stroke-dasharray 0.9s linear,stroke 0.3s"}})
            ),
            React.createElement("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
              React.createElement("div",{style:{fontSize:44,fontWeight:900,color:t===0?"#10B981":"#F5F5F0",lineHeight:1}},t===0?"GO!":t),
              t>0&&React.createElement("div",{style:{fontSize:12,color:"#6B7280",marginTop:2}},"seconds")
            )
          ),
          t===0?React.createElement("div",{style:{fontSize:18,color:"#10B981",fontWeight:700,marginBottom:22}},"Rest complete — start next set!"):
          React.createElement("div",{style:{display:"flex",gap:12,marginBottom:14}},
            React.createElement("button",{onClick:()=>setRun(r=>!r),style:{flex:1,background:run?"#2A2A36":"#3B82F6",color:"#fff",border:"none",borderRadius:16,padding:"15px",fontSize:15,fontWeight:700,cursor:"pointer"}},run?"⏸ Pause":"▶ Resume"),
            React.createElement("button",{onClick:()=>{setT(seconds);setRun(true);},style:{flex:1,background:"#2A2A36",color:"#9CA3AF",border:"none",borderRadius:16,padding:"15px",fontSize:15,fontWeight:700,cursor:"pointer"}},"↺ Reset")
          ),
          React.createElement("button",{onClick:onClose,style:{width:"100%",background:"transparent",color:"#6B7280",border:"1px solid #2A2A36",borderRadius:16,padding:"13px",fontSize:14,fontWeight:600,cursor:"pointer"}},"Close")
        )
      );
    }

    // ── EXERCISE DETAIL ───────────────────────────────────────────────────────
    function ExDetail({ex,cat,sets,onToggle,onBack}){
      const [step,setStep]=useState(0),[timer,setTimer]=useState(false),[tab,setTab]=useState("steps");
      const total=parseInt(ex.sets)||3;
      const done=Array.from({length:total}).filter((_,i)=>sets[cat.id+"__"+ex.name+"__"+i]).length;
      const mark=i=>{const will=!sets[cat.id+"__"+ex.name+"__"+i];onToggle(cat.id,ex.name,i);if(will&&(done+(will?1:-1))<total&&ex.restSeconds>0)setTimeout(()=>setTimer(true),350);};
      const S=n=>React.createElement.bind(null,n);
      const div=S("div"),btn=S("button"),span=S("span");
      return div({style:{background:"#0F0F13",minHeight:"100dvh",fontFamily:"Inter,sans-serif",color:"#F5F5F0"}},
        timer&&React.createElement(RestTimer,{seconds:ex.restSeconds,onClose:()=>setTimer(false)}),
        div({style:{background:cat.color,padding:"calc(env(safe-area-inset-top,0px) + 14px) 16px 22px",borderRadius:"0 0 22px 22px"}},
          btn({onClick:onBack,style:{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",padding:"9px 16px",borderRadius:22,cursor:"pointer",fontSize:14,fontWeight:600,marginBottom:14}},"← Back"),
          div({style:{fontSize:11,opacity:0.85,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:3}},ex.muscles),
          div({style:{fontSize:22,fontWeight:800,marginBottom:12}},ex.name),
          div({style:{display:"flex",gap:9,flexWrap:"wrap"}},
            [["Sets",ex.sets],["Reps",ex.reps],["Rest",ex.rest]].map(([l,v])=>div({key:l,style:{background:"rgba(255,255,255,0.18)",borderRadius:12,padding:"7px 14px",textAlign:"center"}},div({style:{fontSize:15,fontWeight:800}},v),div({style:{fontSize:10,opacity:0.85}},l)))
          )
        ),
        div({style:{padding:"14px 14px 120px"}},
          div({style:{display:"flex",gap:9,marginBottom:14}},
            div({style:{flex:1,background:"#1E0F0F",borderRadius:12,padding:"11px 12px",borderLeft:"3px solid #EF4444"}},div({style:{fontSize:10,color:"#EF4444",fontWeight:700,marginBottom:4}},"❤️ BP"),div({style:{fontSize:12,color:"#D1D5DB",lineHeight:1.5}},ex.bpNote)),
            div({style:{flex:1,background:"#1F1700",borderRadius:12,padding:"11px 12px",borderLeft:"3px solid #F59E0B"}},div({style:{fontSize:10,color:"#F59E0B",fontWeight:700,marginBottom:4}},"🦴 BACK"),div({style:{fontSize:12,color:"#D1D5DB",lineHeight:1.5}},ex.backNote))
          ),
          div({style:{display:"flex",gap:8,marginBottom:14}},
            [["steps","📋 Steps"],["tips","💡 Tips"]].map(([id,lbl])=>btn({key:id,onClick:()=>setTab(id),style:{flex:1,padding:"10px",borderRadius:12,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:tab===id?cat.color:"#1A1A22",color:tab===id?"#fff":"#666"}},lbl))
          ),
          tab==="steps"&&div({style:{background:"#1A1A22",borderRadius:18,padding:18,marginBottom:14}},
            div({style:{fontSize:11,color:"#9CA3AF",fontWeight:700,marginBottom:16,textTransform:"uppercase"}},"Step "+(step+1)+" of "+ex.steps.length),
            ex.steps.map((s,i)=>div({key:i,onClick:()=>setStep(i),style:{display:"flex",gap:12,alignItems:"flex-start",marginBottom:14,cursor:"pointer"}},
              div({style:{minWidth:32,height:32,borderRadius:"50%",background:step===i?cat.color:"#2A2A36",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,flexShrink:0}},i+1),
              div({style:{fontSize:14,lineHeight:1.65,paddingTop:6,color:step===i?"#F5F5F0":"#5A5A6A"}},s)
            )),
            div({style:{display:"flex",gap:10,marginTop:16}},
              btn({onClick:()=>setStep(Math.max(0,step-1)),style:{flex:1,padding:"14px",borderRadius:14,border:"1px solid #2A2A36",background:"transparent",color:"#9CA3AF",fontSize:14,fontWeight:700,cursor:"pointer"}},"← Prev"),
              btn({onClick:()=>setStep(Math.min(ex.steps.length-1,step+1)),style:{flex:1,padding:"14px",borderRadius:14,border:"none",background:cat.color,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}},"Next →")
            )
          ),

              d.ids.length>0&&e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},d.ids.map(id=>{const c=ALL_CATS.find(x=>x.id===id);if(!c)return null;return e("button",{key:id,onClick:()=>setSelCat(id),style:{background:c.color,color:"#fff",border:"none",borderRadius:10,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}},c.emoji+" "+c.label);})),
              d.ids.length===0&&e("span",{style:{fontSize:22}},"😴")
            ))
          ),
          view==="progress"&&e("div",null,
            e("div",{style:{fontSize:16,fontWeight:800,marginBottom:14}},"Your 12-Month Journey"),
            PHASES.map(p=>e("div",{key:p.id,style:{background:phase===p.id?p.color+"15":"#1A1A22",borderRadius:18,padding:18,marginBottom:12,border:phase===p.id?"2px solid "+p.color:"2px solid transparent"}},
              e("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:6}},e("div",{style:{background:p.color,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800,color:"#fff"}},p.label),phase===p.id&&e("div",{style:{fontSize:11,color:p.color,fontWeight:700}},"← YOU ARE HERE")),
              e("div",{style:{fontSize:16,fontWeight:800,color:phase===p.id?p.color:"#F5F5F0",marginBottom:2}},p.sublabel),
              e("div",{style:{fontSize:12,color:"#9CA3AF",marginBottom:8}},p.months),
              e("div",{style:{fontSize:13,color:"#9CA3AF",marginBottom:10,lineHeight:1.6}},p.description),
              p.rules.map((r,i)=>e("div",{key:i,style:{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}},e("span",{style:{color:p.color,flexShrink:0,fontSize:12,marginTop:2}},"→"),e("span",{style:{fontSize:13,color:"#D1D5DB",lineHeight:1.5}},r)))
            )),
            e("div",{style:{background:"#1E1B2E",borderRadius:14,padding:16,border:"1px solid #2D2A3E"}},e("div",{style:{fontSize:12,color:"#A78BFA",fontWeight:700,marginBottom:8}},"📌 Research Note"),e("div",{style:{fontSize:13,color:"#9CA3AF",lineHeight:1.65}},"Based on ACSM guidelines: beginners with high blood pressure see measurable BP reduction within 4 weeks. Machines → dumbbells → free weights is the safest progression for back issues. Deload every 4th week prevents overtraining."))
          ),
          view==="activity"&&e(Activity,{userName:user==="marvin"?"Marvin":"LaShay",log:actLog,onSave:saveAct}),
          view==="profile"&&e("div",null,
            e("div",{style:{background:"linear-gradient(135deg,#1E1B2E,#161B2E)",borderRadius:22,padding:24,marginBottom:14,textAlign:"center"}},
              e("div",{style:{fontSize:56,marginBottom:8}},u.emoji),
              e("div",{style:{fontSize:22,fontWeight:800,marginBottom:4}},u.name),
              u.weight&&e("div",{style:{fontSize:14,color:"#9CA3AF"}},"Current: "+u.weight+" lbs"),
              u.lost&&e("div",{style:{marginTop:18,background:"#0F0F13",borderRadius:14,padding:16}},
                e("div",{style:{fontSize:11,color:"#6B7280",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}},"Progress"),
                e("div",{style:{display:"flex",justifyContent:"space-around"}},[["Started",u.startWeight],["Lost",u.lost+" lbs"],["Now",u.weight]].map(([l,v])=>e("div",{key:l,style:{textAlign:"center"}},e("div",{style:{fontSize:24,fontWeight:900,color:l==="Lost"?"#10B981":"#3B82F6"}},v),e("div",{style:{fontSize:11,color:"#9CA3AF"}},l))))
              )
            ),
            e("div",{style:{background:"#1A1A22",borderRadius:18,padding:18}},
              e("div",{style:{fontSize:14,fontWeight:700,marginBottom:14}},"Health Focus"),
              [user==="marvin"&&{icon:"🦴",title:"Back Issues",desc:"All exercises avoid spinal compression. Core work every session protects your back long-term."},user==="marvin"&&{icon:"❤️",title:"High Blood Pressure",desc:"Every exercise has a breathing cue. Consistent training lowers BP within 4 weeks."},
              {icon:"🏋🏾",title:"Form First Always",desc:"Start lighter than feels necessary. Form before weight, every session."},
              {icon:"🔥",title:"Warm Up Every Time",desc:"10 minutes of warm-up protects joints and makes every workout more effective."}
              ].filter(Boolean).map(item=>e("div",{key:item.title,style:{display:"flex",gap:12,marginBottom:16}},e("div",{style:{fontSize:24,flexShrink:0}},item.icon),e("div",null,e("div",{style:{fontSize:14,fontWeight:700,marginBottom:3}},item.title),e("div",{style:{fontSize:13,color:"#9CA3AF",lineHeight:1.6}},item.desc))))
            )
          )
        ),
        e("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#131318",borderTop:"1px solid #1E1E28",padding:"10px 0 calc(env(safe-area-inset-bottom,0px)+8px)",display:"flex",justifyContent:"space-around",zIndex:100}},
          [["home","🏋🏾","Workouts"],["schedule","📅","Schedule"],["progress","📈","Progress"],["activity","🗺️","Activity"],["profile","👤","Profile"]].map(([id,em,lbl])=>e("button",{key:id,onClick:()=>setView(id),style:{background:"none",border:"none",cursor:"pointer",textAlign:"center",color:view===id?"#fff":"#444",padding:"2px 16px"}},e("div",{style:{fontSize:22}},em),e("div",{style:{fontSize:10,fontWeight:700,marginTop:2}},lbl)))
        )
      );
    }

    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
    setTimeout(()=>{const l=document.getElementById("loading");if(l){l.classList.add("fade-out");setTimeout(()=>l.remove(),500);}},1200);

    if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));}
    document.addEventListener("touchmove",e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
  })();
  </script>
</body>
